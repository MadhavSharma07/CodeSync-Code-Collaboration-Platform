# ?? Application ????????????????????????????????????????????????????????????????
spring.application.name=eureka-server
server.port=8761

# FIX 1: Removed spring.profiles.active=prod ? prod needs EUREKA_HOSTNAME (OpenShift only)
# FIX 2: Hardcoded credentials with default fallback ? no env var needed locally
spring.security.user.name=admin
spring.security.user.password=admin

# ?? Eureka Server ? do NOT register with itself ????????????????????????????????
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.client.service-url.defaultZone=http://admin:admin@localhost:8761/eureka/

# ?? Server tuning ??????????????????????????????????????????????????????????????
eureka.server.eviction-interval-timer-in-ms=5000
eureka.server.enable-self-preservation=false
eureka.server.renewal-percent-threshold=0.85

# ?? Instance info ??????????????????????????????????????????????????????????????
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false

# ?? Actuator ???????????????????????????????????????????????????????????????????
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ?? Logging ????????????????????????????????????????????????????????????????????
logging.level.com.netflix.eureka=INFO
logging.level.com.netflix.discovery=INFO
logging.level.org.springframework.cloud.netflix.eureka=INFO