apiVersion: v1
kind: Secret
metadata:
  name: execution-service-secrets
type: Opaque
stringData:
  DB_URL: "<set-jdbc-db-url>"
  DB_USERNAME: "<set-db-username>"
  DB_PASSWORD: "<set-db-password>"
  EUREKA_DEFAULT_ZONE: "http://<set-eureka-username>:<set-eureka-password>@eureka-service:8761/eureka/"
  RABBITMQ_HOST: "<set-rabbitmq-host>"
  RABBITMQ_PORT: "5671"
  RABBITMQ_USERNAME: "<set-rabbitmq-username>"
  RABBITMQ_PASSWORD: "<set-rabbitmq-password>"
  RABBITMQ_VHOST: "<set-rabbitmq-vhost>"
  RABBITMQ_SSL_ENABLED: "true"
  SANDBOX_PROVIDER: "docker"
  SANDBOX_PISTON_URL: "https://emkc.org/api/v2/piston"
  SANDBOX_MAX_EXECUTION_SECONDS: "10"
  SANDBOX_MAX_MEMORY_MB: "256"
  SANDBOX_NETWORK_DISABLED: "true"
  DOCKER_HOST: "tcp://localhost:2375"
  JDOODLE_CLIENT_ID: ""
  JDOODLE_CLIENT_SECRET: ""
---
apiVersion: v1
kind: Service
metadata:
  name: execution-service
  labels:
    app: execution-service
    project: codesync
spec:
  selector:
    app: execution-service
  ports:
    - name: http
      port: 8085
      targetPort: 8085
      protocol: TCP
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: execution-service
  labels:
    app: execution-service
    project: codesync
spec:
  to:
    kind: Service
    name: execution-service
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect


