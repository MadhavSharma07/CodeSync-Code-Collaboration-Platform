apiVersion: v1
kind: Service
metadata:
  name: file-service
  labels:
    app: file-service
    project: codesync
spec:
  selector:
    app: file-service
  ports:
    - name: http
      port: 8083
      targetPort: 8083
      protocol: TCP
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: file-service
  labels:
    app: file-service
    project: codesync
spec:
  to:
    kind: Service
    name: file-service
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
