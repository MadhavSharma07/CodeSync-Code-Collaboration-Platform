apiVersion: v1
kind: Secret
metadata:
  name: comment-service-secrets
type: Opaque
stringData:
  DB_URL: "<set-jdbc-db-url>"
  DB_USERNAME: "<set-db-username>"
  DB_PASSWORD: "<set-db-password>"
  JWT_SECRET: "<set-strong-jwt-secret>"
  EUREKA_DEFAULT_ZONE: "http://<set-eureka-username>:<set-eureka-password>@eureka-service:8761/eureka/"
  RABBITMQ_HOST: "<set-rabbitmq-host>"
  RABBITMQ_PORT: "5671"
  RABBITMQ_USERNAME: "<set-rabbitmq-username>"
  RABBITMQ_PASSWORD: "<set-rabbitmq-password>"
  RABBITMQ_VHOST: "<set-rabbitmq-vhost>"
  RABBITMQ_SSL_ENABLED: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: comment-service
  labels:
    app: comment-service
    project: codesync
spec:
  selector:
    app: comment-service
  ports:
    - name: http
      port: 8087
      targetPort: 8087
      protocol: TCP
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: comment-service
  labels:
    app: comment-service
    project: codesync
spec:
  to:
    kind: Service
    name: comment-service
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect


