apiVersion: v1
kind: Secret
metadata:
  name: notification-service-secrets
type: Opaque
stringData:
  DB_URL: "<set-jdbc-db-url>"
  DB_USERNAME: "<set-db-username>"
  DB_PASSWORD: "<set-db-password>"
  JWT_SECRET: "<set-strong-jwt-secret>"
  EUREKA_DEFAULT_ZONE: "http://<set-eureka-username>:<set-eureka-password>@eureka-service:8761/eureka/"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "<set-redis-password>"
  RABBITMQ_HOST: "<set-rabbitmq-host>"
  RABBITMQ_PORT: "5671"
  RABBITMQ_USERNAME: "<set-rabbitmq-username>"
  RABBITMQ_PASSWORD: "<set-rabbitmq-password>"
  RABBITMQ_VHOST: "<set-rabbitmq-vhost>"
  RABBITMQ_SSL_ENABLED: "true"
  MAIL_HOST: "smtp.gmail.com"
  MAIL_PORT: "587"
  MAIL_USERNAME: "<set-mail-username>"
  MAIL_PASSWORD: "<set-mail-password>"
  NOTIFICATION_FROM_EMAIL: "<set-from-email>"
  NOTIFICATION_FROM_NAME: "CodeSync"
  FRONTEND_URL: "https://<set-frontend-route>"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  labels:
    app: notification-service
    project: codesync
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8088
      targetPort: 8088
      protocol: TCP
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: notification-service
  labels:
    app: notification-service
    project: codesync
spec:
  to:
    kind: Service
    name: notification-service
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect


