<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="${title}">Notification from CodeSync</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f5f5f5; margin: 0; padding: 0; }
    .container { max-width: 560px; margin: 32px auto; background: #fff;
                 border-radius: 8px; overflow: hidden;
                 box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .header { background: #1a1a2e; padding: 24px 32px; }
    .header h1 { color: #7c6af7; margin: 0; font-size: 22px; }
    .body { padding: 32px; color: #333; line-height: 1.6; }
    .btn { display: inline-block; background: #7c6af7; color: #fff;
           text-decoration: none; padding: 12px 24px; border-radius: 6px;
           margin-top: 24px; font-weight: 600; }
    .footer { background: #f9f9f9; padding: 16px 32px;
              font-size: 12px; color: #999; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"><h1>CodeSync</h1></div>
    <div class="body">
      <h2 th:text="${title}">Notification title</h2>
      <p th:text="${message}">Notification message content goes here.</p>
      <a class="btn" th:href="${deepLinkUrl}" th:if="${deepLinkUrl != null and !deepLinkUrl.isEmpty()}">
        View on CodeSync →
      </a>
    </div>
    <div class="footer">
      <p>
        <a th:href="${frontendBaseUrl + '/settings/notifications'}">
          Manage notification preferences
        </a>
      </p>
    </div>
  </div>
</body>
</html>
