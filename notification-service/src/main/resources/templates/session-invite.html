<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>You've been invited to a CodeSync session</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f5f5f5; margin: 0; padding: 0; }
    .container { max-width: 560px; margin: 32px auto; background: #fff;
                 border-radius: 8px; overflow: hidden;
                 box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .header { background: #1a1a2e; padding: 24px 32px; }
    .header h1 { color: #7c6af7; margin: 0; font-size: 22px; }
    .body { padding: 32px; color: #333; line-height: 1.6; }
    .project-badge { display: inline-block; background: #e8e4ff;
                     color: #5a44e8; padding: 6px 14px; border-radius: 20px;
                     font-size: 14px; font-weight: 600; margin: 8px 0; }
    .btn { display: inline-block; background: #7c6af7; color: #fff;
           text-decoration: none; padding: 12px 28px; border-radius: 6px;
           margin-top: 24px; font-weight: 600; font-size: 16px; }
    .footer { background: #f9f9f9; padding: 16px 32px;
              font-size: 12px; color: #999; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>CodeSync</h1>
    </div>
    <div class="body">
      <p>Hi there 👋</p>
      <p>
        <strong th:text="${invitedBy}">Someone</strong>
        has invited you to a live coding session on:
      </p>
      <div>
        <span class="project-badge" th:text="${projectName}">My Project</span>
      </div>
      <p>Join the session now to start collaborating in real time:</p>
      <a class="btn" th:href="${sessionUrl}">Join Session →</a>
      <p style="margin-top:24px; font-size:13px; color:#777;">
        This invite link expires after the session ends.
      </p>
    </div>
    <div class="footer">
      <p>You received this because you were invited to a CodeSync session.</p>
    </div>
  </div>
</body>
</html>
