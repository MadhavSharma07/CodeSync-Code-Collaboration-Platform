# OpenShift production profile
# These env vars must be set in the OpenShift deployment:
#   EUREKA_PASSWORD  → dashboard password (e.g. admin)
#   EUREKA_HOSTNAME  → OpenShift route URL (e.g. eureka-service-mr-aksthegreat030420-dev.apps.rm1.0a51.p1.openshiftapps.com)

server.port=8761

eureka.instance.hostname=${EUREKA_HOSTNAME}
eureka.instance.prefer-ip-address=false
eureka.instance.non-secure-port=80
eureka.instance.non-secure-port-enabled=true

# Eureka server does NOT register with itself
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Self-preservation ON for production — prevents mass de-registration on network hiccups
eureka.server.enable-self-preservation=true
eureka.server.eviction-interval-timer-in-ms=30000

spring.security.user.name=admin
spring.security.user.password=${EUREKA_PASSWORD}

logging.level.com.netflix.eureka=WARN
logging.level.com.netflix.discovery=WARN