apiVersion: v1
kind: Secret
metadata:
  name: version-service-secrets
type: Opaque
stringData:
  DB_URL: "<set-jdbc-db-url>"
  DB_USERNAME: "<set-db-username>"
  DB_PASSWORD: "<set-db-password>"
  JWT_SECRET: "<set-strong-jwt-secret>"
  EUREKA_DEFAULT_ZONE: "http://<set-eureka-username>:<set-eureka-password>@eureka-service:8761/eureka/"
---
apiVersion: v1
kind: Service
metadata:
  name: version-service
  labels:
    app: version-service
    project: codesync
spec:
  selector:
    app: version-service
  ports:
    - name: http
      port: 8086
      targetPort: 8086
      protocol: TCP
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: version-service
  labels:
    app: version-service
    project: codesync
spec:
  to:
    kind: Service
    name: version-service
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect


